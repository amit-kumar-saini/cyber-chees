name: Build Android App

on:
  push:
    branches:
      - main
  workflow_dispatch: # Isse aap button dabakar bhi build shuru kar sakte hain

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Dependencies
        run: npm install

      - name: Build Web Assets
        run: npm run build

      - name: Create Android Project
        # Ye line magic karegi: Ye check karegi ki android folder hai ya nahi,
        # agar nahi hai to naya bana degi.
        run: |
          npm install @capacitor/android
          if [ ! -d "android" ]; then
            npx cap add android
          fi
          npx cap sync

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: My-Typing-App
          path: android/app/build/outputs/apk/debug/app-debug.apk
